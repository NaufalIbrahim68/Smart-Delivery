<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Smart Delivery System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .4);
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            padding: 2rem;
            text-align: center;
            color: #fff;
        }

        .login-header .brand-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .login-header h1 {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 0;
        }

        .login-header p {
            font-size: 0.85rem;
            opacity: 0.8;
            margin: 0;
        }

        .login-body {
            padding: 2rem;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #374151;
        }

        .btn-login {
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 0.65rem;
            border-radius: 8px;
            transition: opacity 0.2s;
        }

        .btn-login:hover {
            opacity: 0.9;
            color: #fff;
        }

        .input-group-text {
            background: #f8fafc;
            border-right: 0;
        }

        .form-control {
            border-left: 0;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #3b82f6;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-header">
            <div class="brand-icon"><i class="bi bi-truck-front-fill"></i></div>
            <h1>Smart Delivery System</h1>
            <p>Please sign in to continue</p>
        </div>
        <div class="login-body">
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-danger alert-dismissible fade show py-2 small" role="alert">
                {{ message }}
                <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person text-muted"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="Enter your username"
                            autofocus required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" name="password" id="passwordField" class="form-control"
                            placeholder="Enter your password" required>
                        <button type="button" class="btn btn-outline-secondary border-start-0" onclick="togglePwd()">
                            <i class="bi bi-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-login w-100">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePwd() {
            const f = document.getElementById('passwordField');
            const icon = document.getElementById('eyeIcon');
            if (f.type === 'password') {
                f.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                f.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }
    </script>
</body>

</html>
